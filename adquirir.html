<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
        rel="stylesheet">
    <title>Adquirir</title>
</head>
<style>
    body {
        /* 1. Ponemos la imagen de fondo */
        background-image: url('img/tragos.jpg');
        /* O la imagen que prefieras */
        background-size: cover;
        /* Para que cubra toda la pantalla */
        background-position: center;
        /* Centrada */
        background-attachment: fixed;
        /* El fondo se queda quieto al hacer scroll (Efecto Parallax) */

        /* Fuente global */
        font-family: "Short Stack", cursive;
    }

    /* 2. Hacemos que el header y el main tengan fondos semi-transparentes */
    header,
    main {
        background-color: rgba(148, 145, 145, 0.85);
        /* Fondo blanco con 85% de opacidad */
        margin: 20px auto;
        padding: 20px;
        border-radius: 10px;
        /* Bordes redondeados */
        max-width: 1100px;
        /* Ancho máximo para que no se pegue a los bordes */
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        /* Sombra suave */
    }

    /* Ajuste para los links de las redes sociales al final */
    .redes-sociales {
        background-color: rgba(255, 255, 255, 0.85);
        padding: 15px;
        text-align: center;
        border-top: 1px solid #eee;
    }
</style>

<body>

    <table width="100%">
        <tr>
            <!--Volver-->
            <td style="background-color: rgb(161, 154, 85);">
                <a href="index.html" style="text-decoration: none;
                            font-size: larger;
                            font-size: xx-large;">
                    ←Volver
                </a>
            </td>
            <td style="color:rgb(3, 10, 3);
                            background-color: rgb(161, 154, 85);" align="end">
                <h1>
                    <i class="bi bi-trophy-fill"></i>
                    DangerBar
                </h1>
            </td>
            <!--Parte derecha del encabezado-->
        </tr>
    </table>

    <h1 style="color: darkgreen;" align="center">
        Ficha de Contratos
    </h1>

    <p align="center"><b>A continuacion completa los siguientes campos y elige tu paquete deseado:</b></p>
    <hr>

    <main>
        <form action="">
            <fieldset>
                <legend style="color: rgb(73, 73, 240);
                                font-size: x-large;">
                    <b>Datos Personales</b>
                </legend>
                <label for="" style="color: rgb(221, 255, 157);">
                    Nombres y Apellidos Completos:
                </label>
                <br>
                <input type="text" placeholder="Tu nombre aquí" required style="width: 70%;"
                    oninvalid="this.setCustomValidity('No olvides tu nombre')" oninput="this.setCustomValidity('')">
                <br>
                <br>

                <!--Segundo input-->
                <label for="" style="color: rgb(221, 255, 157);">
                    Correo Electronico:
                </label>
                <br>
                <input type="email" placeholder="Tu correo aquí" required style="width: 70%;"
                    oninvalid="this.setCustomValidity('No olvides tu correo')" oninput="this.setCustomValidity('')">
                <br>
                <br>

                <!--Tercer input-->
                <label for="" style="color: rgb(221, 255, 157);">
                    Celular:
                </label>
                <br>
                <input type="cel" placeholder="Tu célular aquí" required
                    oninvalid="this.setCustomValidity('No olvides tu célular')" oninput="this.setCustomValidity('')">
                <br>
                <br>

                <!--Tercer input-->
                <label for="" style="color: rgb(221, 255, 157);">
                    Celebracion o evento:
                </label>
                <br>
                <input type="text" placeholder="Eje. cumpleaños, boda, etc" required style="width: 70%;"
                    oninvalid="this.setCustomValidity('No olvides detallarnos tu celebracion')" oninput="this.setCustomValidity('')">
                <br>
                <br>
            </fieldset>
            <br>
            <br>
            <fieldset>
                <legend style="color: rgb(73, 73, 240);
                        font-size: x-large;">
                    <b>Detaller del Paquete</b>
                </legend>
                <label for="" style="color: rgb(221, 255, 157);">
                    Servicio deseado:
                </label>
                <br>
                <main style="color: rgb(221, 255, 157);">
                    <input type="checkbox"> Barman
                    <br>
                    <input type="checkbox"> Mozo
                    <br>
                    <input type="checkbox"> Barman & Mozo
                </main>
            </fieldset>

            <br>
            <div style="display: flex; justify-content: center; margin: 30px 0;">
                <button type="submit" style="background-color: #7fced8; 
              color: #000000; 
              border: 2px solid #235e18;
              border-radius: 10px;
              padding: 10px 25px; 
              font-family: 'Short Stack', cursive; /* Para que herede la fuente */
              font-size: x-large;
              display: inline-block; 
              cursor: pointer;
              transition: background-color 0.3s ease;">
                    <i class="bi bi-box-arrow-in-down"></i> Guardar
                </button>
            </div>
        </form>

    </main>

</body>

</html>
